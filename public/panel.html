<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Deployment Panel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Bot Deployment Panel</h1>
    <form id="deployment-form">
        <label for="bot-name">Bot Name:</label>
        <input type="text" id="bot-name" name="bot-name" required>
        <button type="submit">Deploy Bot</button>
    </form>
    <div id="status">
        <h2>Pairing Status</h2>
        <p id="pairing-status">No bots deployed.</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
